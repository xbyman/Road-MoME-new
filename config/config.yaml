# ==============================================================================
# Road-MoME 全局配置文件 (v9.8 云端 E2E 均衡版)
# 架构跃迁：纯 PyTorch 3D 骨干 + 活体 ConvNeXt 端到端 + 动态致盲平权
# 核心注入：AMP 混合精度 + Focal Loss + 3D 软置信度兜底
# ==============================================================================

# 1. 路径管理 (已重构为相对路径，完美适配 Linux Docker/云容器)
paths:
  raw_pcd_dir: "./data/RSRD-dense/test"
  raw_img_dir: "./data/RSRD-dense"
  output_dir: "./data/frame_packages_densefull"
  manual_label_path: "./merged_visual_gt.json"
  log_dir: "./logs"
  checkpoint_dir: "./pretrained_models"
  vis_output_dir: "./data/inference_vis_v9.8"
  weights:
    point_mae: "./pretrained_models/pretrain.pth"
    mome_model: "./pretrained_models/road_mome_v9_e2e_best.pth"

# 2. 训练配置 (v9.8 精准打击均衡版)
# ------------------------------------------------------------------------------
training:
  experiment_name: "MoME_v9.8_Cloud_E2E_Balanced"
  seed: 42
  epochs: 80
  
  # 建议显存充裕时设为 32 或 64
  batch_size: 64
  
  # ==========================================
  # [v9.8 核心修改] 专家平权与防误报调优
  # ==========================================
  # 1. 双轨学习率控制 (赋予 2D 专家更高的话语权，加快收敛)
  learning_rate_base: 0.0001   # 门控网络与分类头 (1e-4)
  learning_rate_2d: 0.00003    # ConvNeXt 提取器 (由 1e-5 提升至 3e-5)
  
  # 2. 动态致盲阈值 (削弱对 2D 的压制，防止 3D 一家独大)
  blind_prob_start: 0.2        # 初始致盲率 (原0.3)
  blind_prob_end: 0.3          # 最终致盲率 (由 0.7 大幅下调，解放视觉专家)

  # 3. 正负样本权重 (提升 Precision，减少假阳性误报)
  pos_weight: 3.0              # 漏报惩罚下调 (由 5.0 降至 3.0)
  
  # ==========================================
  
  val_split: 0.15
  amp_enabled: true
  focal_loss_gamma: 2.0
  soft_confidence_range: [0.025, 0.035] 
  soft_confidence_weight: 0.1           
  resume: false
  save_best: true
  sanity_check:
    ignore_corrupt: true

# 3. 特征维度 
features:
  phys: { key_name: "phys_8d", input_dim: 8 }
  3d:   { key_name: "deep_512d", input_dim: 384 }
  2d:   { key_name: "deep_2d_1024d", input_dim: 1024 } 
  shared_dim: 128 

# 4. 几何与空间参数
geometry:
  roi_x: [-3, 3]       
  roi_y: [-8, -1]      
  patch_size_x: 0.85   
  patch_size_y: 0.77   
  overlap: 0.0         
  th_anomaly: 0.05
  sigma_q: 0.015
  max_patches: 63      

# 5. 点云采样规格
sampling:
  n_points: 8192
  k_z_stretch: 10.0
  trans_dim: 384

# 6. 推理与诊断控制
inference:
  mode: "random"       
  batch_limit: 20
  inference_batch_size: 8
  q2_default: 0.8
  save_plots: true
  show_plots: false